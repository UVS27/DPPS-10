name: DAST (OWASP ZAP)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  zap:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create app database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -c "CREATE DATABASE software_company_db;" || true

      - name: Run web app
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_NAME: software_company_db
          APP_SECRET_KEY: "ci-secret-key"
          LOG_DIR: logs
        run: |
          nohup gunicorn -b 127.0.0.1:5000 webapp:app >/tmp/gunicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:5000/login" >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start. Last logs:"
          tail -n 200 /tmp/gunicorn.log || true
          exit 1

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:5000/"
          allow_issue_writing: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
