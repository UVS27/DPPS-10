{% extends "base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h5 class="card-title mb-3">Регистрация / вход в БД</h5>
          <p class="text-muted mb-4">
            Введите логин и пароль для доступа к PostgreSQL.
          </p>
          <form method="post" action="{{ url_for('login_post') }}">
            <div class="mb-3">
              <label class="form-label">Логин</label>
              <input class="form-control" name="username" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Пароль</label>
              <input class="form-control" type="password" name="password" autocomplete="current-password" required />
            </div>
            <button class="btn btn-primary w-100" type="submit">Войти</button>
          </form>
        </div>
      </div>
      <div class="text-muted small mt-3">
        Хост: <code>{{ config.DB_HOST }}</code>, порт: <code>{{ config.DB_PORT }}</code>, БД: <code>{{ config.DB_NAME }}</code>
      </div>
    </div>
  </div>
{% endblock %}
