{% extends "base.html" %}
{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h4 class="mb-1">Редактирование: <code>{{ table_name }}</code></h4>
      <div class="text-muted small">PRIMARY KEY: <code>{{ pk }}</code> = <code>{{ pk_value }}</code></div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('table_view', table_name=table_name) }}">Назад</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          {% for c in columns %}
            <div class="col-md-6">
              <label class="form-label">
                {{ c.name }}
                {% if not c.nullable %}<span class="text-danger">*</span>{% endif %}
                <span class="text-muted small">({{ c.data_type }})</span>
              </label>
              <input
                class="form-control"
                name="{{ c.name }}"
                value="{{ '' if row.get(c.name) is none else row.get(c.name) }}"
                {% if not c.nullable %}required{% endif %}
              />
            </div>
          {% endfor %}
        </div>

        <div class="mt-4 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Сохранить</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('table_view', table_name=table_name) }}">Отмена</a>
        </div>
      </form>
    </div>
  </div>

  <div class="text-muted small mt-3">
    <div><span class="text-danger">*</span> — поле обязательно (NOT NULL).</div>
    <div>Редактирование <code>{{ pk }}</code> будет отменено, если есть ссылки из других таблиц.</div>
  </div>
{% endblock %}
